# Example GitHub Actions workflow for building criu-precheck
# Copy this to .github/workflows/build.yml in your repo

name: Build Multi-Architecture

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install cross-compiler (ARM64)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: |
          cd contrib/castai/criu-precheck
          make clean
          make ARCH=${{ matrix.arch }}
          mv criu-precheck criu-precheck-${{ matrix.arch }}

      - name: Verify binary
        run: |
          cd contrib/castai/criu-precheck
          file criu-precheck-${{ matrix.arch }}
          ls -lh criu-precheck-${{ matrix.arch }}

      - name: Test binary (help output)
        run: |
          cd contrib/castai/criu-precheck
          ./criu-precheck-${{ matrix.arch }} --help || true

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: criu-precheck-${{ matrix.arch }}
          path: contrib/castai/criu-precheck/criu-precheck-${{ matrix.arch }}
          retention-days: 30

  build-static:
    name: Build Static ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install cross-compiler (ARM64)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build static binary
        run: |
          cd contrib/castai/criu-precheck
          make clean
          make ARCH=${{ matrix.arch }} STATIC=1
          mv criu-precheck-static criu-precheck-${{ matrix.arch }}-static

      - name: Verify static binary
        run: |
          cd contrib/castai/criu-precheck
          file criu-precheck-${{ matrix.arch }}-static
          ls -lh criu-precheck-${{ matrix.arch }}-static

      - name: Upload static binary
        uses: actions/upload-artifact@v3
        with:
          name: criu-precheck-${{ matrix.arch }}-static
          path: contrib/castai/criu-precheck/criu-precheck-${{ matrix.arch }}-static
          retention-days: 90

  test:
    name: Test on ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Download binary
        uses: actions/download-artifact@v3
        with:
          name: criu-precheck-${{ matrix.arch }}

      - name: Set up QEMU (for ARM64)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v2

      - name: Test binary
        run: |
          chmod +x criu-precheck-${{ matrix.arch }}

          # Start a simple process
          sleep 1000 &
          PID=$!

          # Run pre-check (may fail on GitHub runners, that's OK)
          sudo ./criu-precheck-${{ matrix.arch }} -t $PID || true

          # Clean up
          kill $PID || true

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, build-static]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            criu-precheck-amd64/criu-precheck-amd64
            criu-precheck-arm64/criu-precheck-arm64
            criu-precheck-amd64-static/criu-precheck-amd64-static
            criu-precheck-arm64-static/criu-precheck-arm64-static
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
